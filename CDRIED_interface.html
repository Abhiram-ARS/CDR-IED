<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDR-IED</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-secondary: #f0f0f0;
            --bg-toolbar: #e0e0e0;
            --text-primary: #000000;
            --text-secondary: #555555;
            --border-color: #a0a0a0;
            --highlight: #cce5ff;
            --highlight-border: #0099ff;
            
            /* Protocol Colors */
            --proto-tcp: #6f00ff;
            --proto-udp: #ff6600;
            --proto-http: #00cc00;
            --proto-dns: #ffcc00;
            --proto-arp: #333;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Toolbar Area --- */
        /* Narrow top bar above toolbar (app name) */
        .topbar {
            height: 28px;
            flex: 0 0 28px;
            background-color: #d0d0d0;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #bfbfbf;
            font-weight: 600;
            color: #222;
            font-size: 13px;
        }
        .topbar .app-name { flex: 1; }

        .toolbar {
            flex: 0 0 40px;
            background-color: #dcdcdc;
            padding: 5px;
            border-bottom: 1px solid #999;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
        }

        .btn {
            background: #fff;
            border: 1px solid #777;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 11px;
        }
        .btn:active { background: #ddd; }
        .btn-start { border-left: 4px solid #00cc00; padding-left: 8px;}
        .btn-stop { border-left: 4px solid #cc0000; padding-left: 8px;}
        .btn-statistics { border-left: 4px solid #2f00ff; padding-left: 8px;}
        .btn-filter { border-left: 4px solid #2f00ff; padding-left: 8px;}

        .filter-input {
            flex-grow: 1;
            padding: 4px;
            border: 1px solid #777;
            font-family: monospace;
        }

        /* --- Main Layout Area --- */
        .panes-container {
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        /* Top Pane: Packet List Table */
        .packet-list-pane {
            flex: 3 1 0;
            min-height: 0;
            overflow: auto;
            border-bottom: 2px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
        }

        thead th {
            background-color: #eee;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #999;
            padding: 4px;
            text-align: left;
            font-weight: normal;
            color: #333;
        }

        tbody tr:hover { background-color: #e6f2ff; }
        
        tbody tr.selected {
            background-color: var(--highlight) !important;
            outline: 1px solid var(--highlight-border);
        }

        td { padding: 2px 4px; border-bottom: 1px solid #eee; white-space: nowrap; }

        /* Protocol specific text colors */
        .col-proto.proto-tcp { color: var(--proto-tcp); font-weight: bold; }
        .col-proto.proto-udp { color: var(--proto-udp); font-weight: bold; }
        .col-proto.proto-http { color: var(--proto-http); font-weight: bold; }
        .col-proto.proto-dns { color: var(--proto-dns); }
        .col-proto.proto-arp { color: var(--proto-arp); }

        /* Split Pane Container removed: packet-bytes pane omitted */

        /* Middle Pane: Packet Details */
        .packet-details-pane {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
            padding: 12px 10px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .details-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid #d9e3ef;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
        }

        .details-title {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .details-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: #64748b;
        }

        .details-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .details-summary-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            min-height: 72px;
        }

        .details-summary-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
        }

        .details-summary-value {
            margin-top: 6px;
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
        }

        .details-statistics {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .statistics-heading {
            width: 100%;
            margin: 0;
            font-size: 14px;
            color: #0f172a;
        }

        .statistics-chart-card {
            width: 190px;
            gap: 12px;
            background: #fff;
            border: 1px solid #dbe3ee;
            border-radius: 8px;
            padding: 7px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.08);
        }

        .statistics-chart-card:hover {
            border-color: #2563eb;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.18);
        }

        .statistics-chart-title {
            margin: 0 0 5px;
            font-size: 11px;
            font-weight: 700;
            color: #0f172a;
        }

        .statistics-chart-image {
            width: 100%;
            height: 105px;
            display: block;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            background: #fff;
        }

        .statistics-empty {
            background: #fff;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 14px;
            color: #64748b;
            font-size: 12px;
        }

        .btn-compact {
            padding: 6px 10px;
            font-size: 11px;
        }

        .tree-view ul {
            list-style: none;
            padding-left: 15px;
            margin: 0;
        }
        
        .tree-item {
            margin: 2px 0;
            cursor: pointer;
        }

        .tree-label { color: #000; font-weight: bold; }
        .tree-value { color: #333; }
        .field-item { margin-left: 0; }
        .field-item ul { display: none; } /* Hide children by default for fold effect */
        .field-item.active ul { display: block; }

        /* Packet bytes styles removed (hex dump not used) */

        /* --- Status Bar --- */
        .status-bar {
            height: 24px;
            flex: 0 0 24px;
            background-color: #dcdcdc;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 11px;
            color: #333;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #999;
        }

        .status-bar.error {
            background-color: #ff1a1a;
            border-top: 1px solid #ff0000;
            color: #ffffff;
            font-weight: 700;
        }

        /* Modal for record details */
        .modal { position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); }
        .modal .modal-content { background: #fff; padding: 14px; border-radius: 6px; width: clamp(280px, 40%, 700px); max-width: 700px; max-height: 80%; overflow: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.2); font-size: 14px; line-height: 1.4; }
        .modal .modal-content table { width: 100%; border-collapse: collapse; }
        .modal .modal-content td, .modal .modal-content th { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; text-align: left; }
        .modal .modal-content th { font-weight: 700; width: 30%; }
        .modal .modal-content pre { font-family: "Courier New", monospace; white-space: pre; margin:0; }
        .modal .modal-content .modal-body { margin-top: 6px; }
        .modal .search-panel { display: grid; gap: 10px; }
        .modal .search-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .modal .search-row input[type="text"] { flex: 1 1 220px; padding: 8px 10px; border: 1px solid #bbb; border-radius: 4px; font: inherit; }
        .modal .search-results { max-height: 280px; overflow: auto; border: 1px solid #eee; border-radius: 4px; }
        .modal .search-results table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .modal .search-results td, .modal .search-results th { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
        .modal .search-results thead th { position: sticky; top: 0; background: #fafafa; }
        .modal .filter-list { display: grid; gap: 8px; }
        .modal .filter-list label { display: flex; gap: 8px; align-items: center; }

        #filterModal .modal-content { width: clamp(280px, 32%, 460px); }

    </style>
</head>
<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="app-name">CDR-IED : Call Detail Record Interpretation and Examination Dashboard</div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <label class="btn btn-start" for="csvFileInput" style="cursor:pointer">Upload CDR</label>
        <input id="csvFileInput" type="file" accept=".csv,text/csv" style="display:none">
        </label>
        <button class="btn btn-stop" id="refreshBtn" type="button">Refresh</button>
        <button class="btn btn-statistics" id="statisticsBtn" type="button">Statistics</button>
        <button class="btn btn-filter" id="filterBtn" type="button">Filter</button>
        <input type="text" class="filter-input" id="filterInput" placeholder="Search">
        <button class="btn" id="applySearchBtn" type="button">Apply</button>
    </div>

    <!-- MAIN AREA -->
    <div class="panes-container">
        
        <!-- 1. PACKET LIST TABLE -->
        <div class="packet-list-pane">
            <table id="packetTable">
                <thead>
                    <tr>
                        <th><b>Si No</b></th>
                        <th><b>A-Party</b></th>
                        <th><b>B-Party</b></th>
                        <th><b>Call Type</b></th>
                        <th><b>Start Date</b></th>
                        <th><b>Start Time</b></th>
                        <th><b>Duration</b></th>
                        <th><b>IMEI</b></th>
                        <th><b>IMSI</b></th>
                        <th><b>Cell ID</b></th>
                        <th><b>Call Status</b></th>
                    </tr>
                </thead>
                <tbody id="packetBody">
                    <!-- JS will populate this with CDR rows -->
                </tbody>
            </table>
        </div>

        <!-- DETAILS PANE (packet-bytes pane removed) -->
        <div class="packet-details-pane" id="detailsPane">
            <div class="statistics-empty">Upload a CDR file to generate statistics.</div>
        </div>

    </div>

    <!-- STATUS BAR -->
    <div class="status-bar" id="statusBar">
        <span id="statusLbl">Packets: 0</span>
        <span id="selectionInfo">Selected: None</span>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="modal" style="display:none">
        <div class="modal-content">
            <button id="modalClose" class="btn" style="float:right">❌ Close</button>
            <div id="modalBody" class="modal-body">
                <div class="search-panel">
                    <div><b>Search CDR</b></div>
                    <div class="search-row">
                        <input id="searchText" type="text" placeholder="Enter search text">
                        <button id="searchBtn" class="btn" type="button">🔍Search</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- FILTER MODAL -->
    <div id="filterModal" class="modal" style="display:none">
        <div class="modal-content">
            <button id="filterModalClose" class="btn" style="float:right">❌ Close</button>
            <div class="modal-body">
                <div class="search-panel">
                    <div><b>Select Filter Fields</b></div>
                    <div class="filter-list">
                        <label><input type="checkbox" name="filterField" value="B-Party"> B-Party</label>
                        <label><input type="checkbox" name="filterField" value="Call Type"> Call Type</label>
                        <label><input type="checkbox" name="filterField" value="Start Date"> Start Date</label>
                        <label><input type="checkbox" name="filterField" value="Call Status"> Call Status</label>
                    </div>
                    <button id="filterApplyBtn" class="btn" type="button">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <script>
       
        (function(){
            // rowsData holds parsed data rows from Python backend
            let rowsData = [];
            const REQUIRED_COLS = ['A-Party','B-Party','Call Type','Start Date','Start Time','Duration','IMEI','IMSI','Cell ID','Call Status'];
            
            // DOM element references
            const fileInput = document.getElementById('csvFileInput');
            const tbody = document.getElementById('packetBody');
            const statusLbl = document.getElementById('statusLbl');
            const statusBar = document.getElementById('statusBar');
            const selectionInfo = document.getElementById('selectionInfo');
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');
            const searchText = document.getElementById('searchText');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');
            const filterBtn = document.getElementById('filterBtn');
            const filterModal = document.getElementById('filterModal');
            const filterModalClose = document.getElementById('filterModalClose');
            const filterApplyBtn = document.getElementById('filterApplyBtn');
            const filterInput = document.getElementById('filterInput');
            const applySearchBtn = document.getElementById('applySearchBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const statisticsBtn = document.getElementById('statisticsBtn');
            const detailsPane = document.getElementById('detailsPane');
            // ============ UI Utility Functions ============

            function setStatus(message, isError){
                statusLbl.textContent = message;
                statusBar.classList.toggle('error', !!isError);
            }

            function escapeHtml(value){
                return (value || '').toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function renderSearchResults(matches, field, query){
                if(!query){
                    searchResults.innerHTML = '<div style="padding:10px;color:#666;">Enter a value and click Search.</div>';
                    return;
                }

                if(!matches.length){
                    searchResults.innerHTML = '<div style="padding:10px;color:#a00;">No matching records found.</div>';
                    return;
                }

                const rowsHtml = matches.map((item) => {
                    return '<tr>' +
                        '<td>' + escapeHtml(item.si) + '</td>' +
                        '<td>' + escapeHtml(item.row["A-Party"]) + '</td>' +
                        '<td>' + escapeHtml(item.row["B-Party"]) + '</td>' +
                        '<td>' + escapeHtml(item.row["Call Type"]) + '</td>' +
                        '<td>' + escapeHtml(item.row["Start Date"]) + '</td>' +
                        '<td>' + escapeHtml(item.row["Start Time"]) + '</td>' +
                        '</tr>';
                }).join('');

                searchResults.innerHTML =
                    '<div style="padding:8px 10px;background:#f8f8f8;border-bottom:1px solid #eee;">' +
                        'Matches for <b>' + escapeHtml(field) + '</b>: <b>' + escapeHtml(query) + '</b> (' + matches.length + ')' +
                    '</div>' +
                    '<table>' +
                        '<thead><tr><th>Si No</th><th>A-Party</th><th>B-Party</th><th>Call Type</th><th>Start Date</th><th>Start Time</th></tr></thead>' +
                        '<tbody>' + rowsHtml + '</tbody>' +
                    '</table>';
            }

            function performSearch(){
                const field = 'B-Party';
                const query = searchText.value.trim();
                if(!query){
                    searchResults.innerHTML = '<div style="padding:10px;color:#666;">Enter a value and click Search.</div>';
                    return;
                }
                // Call Python backend to search
                window.pywebview.api.search_by_field(field, query).then(matches => {
                    renderSearchResults(matches, field, query);
                }).catch(err => {
                    searchResults.innerHTML = '<div style="padding:10px;color:#a00;">Error performing search: ' + escapeHtml(err) + '</div>';
                });
            }

            function getSelectedFilterLabels(){
                return Array.from(document.querySelectorAll('input[name="filterField"]:checked')).map((input) => input.value);
            }

            function openFilterModal(){
                filterModal.style.display = 'flex';
            }

            function closeFilterModal(){
                filterModal.style.display = 'none';
            }

            function applyFilterSelection(){
                const selected = getSelectedFilterLabels();
                filterInput.value = selected.map((field) => field + ' = ').join(', ');
                closeFilterModal();
                filterInput.focus();
            }

            function applyDisplayedFilters(){
                const expression = filterInput.value.trim();
                window.pywebview.api.filter_records(expression).then(result => {
                    if(!result.success){
                        setStatus(result.error, true);
                        return;
                    }

                    renderRows(result.data);
                    setStatus(`Showing ${result.count} of ${result.total} records`, false);
                    selectionInfo.textContent = `Filters: ${result.filter_count}`;
                }).catch(err => {
                    setStatus('Error applying filters: ' + err, true);
                });
            }

            function clearDisplayedFilters(){
                filterInput.value = '';
                window.pywebview.api.get_all_records().then(result => {
                    renderRows(result.data);
                    selectionInfo.textContent = 'Selected: None';
                }).catch(err => {
                    setStatus('Error refreshing records: ' + err, true);
                });
            }

            function openStatisticsWindow(statisticId){
                window.pywebview.api.open_statistics_window(statisticId).then(result => {
                    if(!result.success){
                        setStatus(result.error, true);
                    }
                }).catch(err => {
                    setStatus('Error opening Matplotlib window: ' + err, true);
                });
            }

            function renderStatistics(statistics){
                if(!statistics || !statistics.length){
                    detailsPane.innerHTML =
                        '<div class="statistics-empty">No statistics images are available.</div>';
                    return;
                }

                const cards = statistics.map((statistic) => {
                    return '<button class="statistics-chart-card" type="button" ' +
                        'data-statistic-id="' + escapeHtml(statistic.id) + '" ' +
                        'title="Open interactive Matplotlib window">' +
                        '<div class="statistics-chart-title">' +
                            escapeHtml(statistic.title) +
                        '</div>' +
                        '<img class="statistics-chart-image" src="' +
                            escapeHtml(statistic.preview) +
                            '" alt="' + escapeHtml(statistic.title) + '">' +
                    '</button>';
                }).join('');

                detailsPane.innerHTML =
                    '<div class="details-statistics">' +
                        '<h2 class="statistics-heading">Statistics</h2>' +
                        cards +
                    '</div>';

                detailsPane.querySelectorAll('[data-statistic-id]').forEach((card) => {
                    card.addEventListener('click', () => {
                        openStatisticsWindow(card.dataset.statisticId);
                    });
                });
            }

            function loadStatistics(){
                window.pywebview.api.get_statistics().then(result => {
                    renderStatistics(result.statistics);
                }).catch(err => {
                    setStatus('Error loading statistics: ' + err, true);
                });
            }

            // ============ Event Handlers ============

            function renderRows(rows, headerMap){
                tbody.innerHTML = '';
                rowsData = rows || [];
                rows.forEach((r, i) => {
                    const tr = document.createElement('tr');
                    const obj = r; // Data is already processed by Python
                    rowsData[i] = obj;
                    const cells = REQUIRED_COLS.map(col => obj[col] || '');
                    // prepend serial number as first cell
                    const si = i + 1;
                    tr.innerHTML = [`<td>${si}</td>`].concat(cells.map(c => `<td>${escapeHtml(c)}</td>`)).join('');
                    tr.addEventListener('click', () => showDetails(i, tr));
                    tbody.appendChild(tr);
                });
                setStatus(`Records: ${rows.length}`, false);
            }

            function showDetails(index, trElement){
                // highlight selection
                Array.from(tbody.children).forEach(r => r.classList.remove('selected'));
                if(trElement) trElement.classList.add('selected');

                const r = rowsData[index] || {};
                searchText.value = r['B-Party'] || '';
                renderSearchResults([{ si: index + 1, row: r }], 'B-Party', searchText.value.trim());
                modal.style.display = 'flex';
                searchText.focus();
            }

            // modal close handlers
            modalClose.addEventListener('click', () => { modal.style.display = 'none'; });
            modal.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
            document.addEventListener('keydown', (e) => { if(e.key === 'Escape') modal.style.display = 'none'; });
            searchBtn.addEventListener('click', performSearch);
            searchText.addEventListener('keydown', (e) => {
                if(e.key === 'Enter'){
                    e.preventDefault();
                    performSearch();
                }
            });

            filterBtn.addEventListener('click', openFilterModal);
            filterModalClose.addEventListener('click', closeFilterModal);
            filterModal.addEventListener('click', (e) => { if(e.target === filterModal) closeFilterModal(); });
            filterApplyBtn.addEventListener('click', applyFilterSelection);
            applySearchBtn.addEventListener('click', applyDisplayedFilters);
            refreshBtn.addEventListener('click', clearDisplayedFilters);
            statisticsBtn.addEventListener('click', loadStatistics);
            filterInput.addEventListener('keydown', (e) => {
                if(e.key === 'Enter'){
                    e.preventDefault();
                    applyDisplayedFilters();
                }
            });

            fileInput.addEventListener('change', (ev) => {
                const f = ev.target.files && ev.target.files[0];
                if(!f) return;
                selectionInfo.textContent = `Selected: ${f.name}`;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    // Call Python backend to process CSV
                    window.pywebview.api.process_csv_data(text).then(result => {
                        if(!result.success){
                            setStatus(result.error, true);
                            return;
                        }
                        // Store data and render rows
                        renderRows(result.data, null); // Pass null for headerMap since data is already processed
                        renderStatistics(result.statistics);
                    }).catch(err => {
                        setStatus('Error processing CSV: ' + err, true);
                    });
                };
                reader.onerror = () => { setStatus('Failed to read file.', true); };
                reader.readAsText(f);
            });

            // initial state
            tbody.innerHTML = '';
            searchResults.innerHTML = '<div style="padding:10px;color:#666;">Click a row to open search.</div>';
            setStatus('Records: 0', false);
            
            // Wait for pywebview API to be ready
            window.addEventListener('pywebviewready', () => {
                console.log('PyWebView API is ready');
                setStatus('Ready. Upload a CSV file to get started.', false);
            });
        })();
    </script>
